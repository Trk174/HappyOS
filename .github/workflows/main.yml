name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Archiso on Ubuntu
        run: |
          # Instalăm dependențele necesare pentru a rula mkarchiso
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools libarchive-tools mtools dosemu2 mtools genisoimage xorriso

      - name: Build using a specialized Action
        uses: arch-community/archiso-action@v1
        with:
          # Această acțiune este făcută special pentru a construi Arch pe GitHub
          buildmode: iso
          output-directory: output
