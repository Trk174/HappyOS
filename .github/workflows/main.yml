name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build HappyOS
        run: |
          # 1. Instalăm unelte de bază pe Ubuntu
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools git

          # 2. Instalăm archiso manual să fim siguri că e ultima versiune
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso && sudo make install && cd ..

          # 3. REPARĂM REȚETA (Aici era eroarea 2)
          # Archiso vrea ca fișierele să aibă permisiuni stricte
          sudo chown -R root:root .
          sudo chmod 755 profiledef.sh
          [ -d airootfs ] || mkdir airootfs

          # 4. START BUILD
          mkdir -p output
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
