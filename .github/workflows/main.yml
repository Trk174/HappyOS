name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Asta îți permite să pornești build-ul și manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO using Docker
        run: |
          # Folosim un container de Arch Linux pentru a rula mkarchiso
          docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm &&
            pacman -S --noconfirm archiso mkinitcpio &&
            mkarchiso -v -w /tmp/archiso-tmp -o /workspace/output ."

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
