name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build HappyOS
        run: |
          # Pornim un container curat de Arch Linux
          docker run --privileged -v $(pwd):/workspace archlinux:latest /bin/bash -c "
            # 1. Update baze de date
            pacman -Syu --noconfirm &&
            # 2. Instalare archiso
            pacman -S --noconfirm archiso &&
            # 3. Creăm folderul de output
            mkdir -p /workspace/output &&
            # 4. Construim ISO-ul (folosind configurarea din workspace)
            mkarchiso -v -w /tmp/archiso-tmp -o /workspace/output /workspace
          "

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
