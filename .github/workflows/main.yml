name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools

      - name: Setup Archiso
        run: |
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso
          sudo make install

      - name: Run Build
        run: |
          mkdir -p output
          # Rulăm mkarchiso direct pe mașina Ubuntu
          # Folosim sudo pentru a evita orice problemă de permisiuni
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
