name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools git

      - name: Install Archiso
        run: |
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso && sudo make install && cd ..

      - name: The Master Build Script
        run: |
          # 1. CURĂȚARE ȘI PREGĂTIRE
          sudo rm -rf /tmp/archiso-tmp
          mkdir -p output
          
          # 2. REPARARE MIRRORLIST (Eroarea ta principală)
          # Creăm folderul pacman.d în locația standard
          sudo mkdir -p pacman.d
          # Căutăm orice fișier mirrorlist în repo și îl mutăm unde trebuie
          find . -name mirrorlist -exec sudo cp {} pacman.d/mirrorlist \;
          # Dacă tot nu există, creăm unul de rezervă
          if [ ! -f pacman.d/mirrorlist ]; then
            echo "Server = https://geo.mirror.pkgbuild.com/\$repo/os/\$arch" | sudo tee pacman.d/mirrorlist
          fi

          # 3. INTEGRARE FUNDAL (Wallpaper-ul tău cu : ) )
          mkdir -p airootfs/usr/share/backgrounds/
          # Căutăm orice imagine care conține "wallpaper" în nume
          find . -name "*wallpaper*" -exec sudo cp {} airootfs/usr/share/backgrounds/happyos-wallpaper.png \;

          # 4. FORȚARE PERMISIUNI (Esențial pentru succes)
          # Archiso vrea ca fișierele să aparțină de root (administrator)
          sudo chown -R root:root .

          # 5. LANSARE MKARCHISO
          # -v (verbose) ne arată tot ce se întâmplă live
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
