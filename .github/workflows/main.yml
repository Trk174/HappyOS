name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools git

      - name: Setup Archiso
        run: |
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso && sudo make install && cd ..

      - name: The 10/10 Build Fix
        run: |
          # 1. REPARARE MIRRORLIST & PACMAN.D
          # Cream folderul in root, indiferent de ce e pe GitHub
          sudo mkdir -p pacman.d
          
          # Cautam fisierul mirrorlist oriunde ar fi (chiar si in .github/workflows)
          M_PATH=$(find . -name mirrorlist | head -n 1)
          if [ -z "$M_PATH" ]; then
            echo "Server = https://geo.mirror.pkgbuild.com/\$repo/os/\$arch" | sudo tee pacman.d/mirrorlist
          else
            sudo cp "$M_PATH" pacman.d/mirrorlist
          fi

          # 2. INTEGRARE WALLPAPER
          # Cream calea oficiala Linux pentru fundaluri
          mkdir -p airootfs/usr/share/backgrounds/
          # Cautam poza cu smiley face (poate fi .png sau .jpg)
          W_PATH=$(find . -name "*wallpaper*" | head -n 1)
          if [ -n "$W_PATH" ]; then
            sudo cp "$W_PATH" airootfs/usr/share/backgrounds/happyos-wallpaper.png
          fi
          
          # 3. PERMISIUNI (Scutul anti-eroare 2)
          mkdir -p output
          sudo rm -rf /tmp/archiso-tmp
          sudo chown -R root:root .
          
          # 4. START CONSTRUCTIE
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload HappyOS ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
