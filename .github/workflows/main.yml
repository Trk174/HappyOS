name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools git

      - name: Install Archiso
        run: |
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso && sudo make install && cd ..

      - name: Fix Permissions and Build
        run: |
          mkdir -p output
          # Forțăm permisiunile de root pe care le vrea archiso
          sudo chown -R root:root .
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload HappyOS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
