name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools git

      - name: Setup Archiso
        run: |
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso && sudo make install && cd ..

      - name: Final Fix and Build
        run: |
          # 1. REPARARE MIRRORLIST (Rezolvă eroarea din imagine)
          # Creăm folderul unde mkarchiso se așteaptă să găsească mirrorlist-ul
          sudo mkdir -p pacman.d
          
          # Căutăm mirrorlist-ul oriunde e ascuns și îl copiem în folderul corect
          MIRROR_PATH=$(find . -name mirrorlist | head -n 1)
          if [ -n "$MIRROR_PATH" ]; then
            sudo cp "$MIRROR_PATH" pacman.d/mirrorlist
          else
            # Dacă chiar lipsește, îl creăm pe loc ca să nu mai dea eroare
            echo "Server = https://mirror.rackspace.com/archlinux/\$repo/os/\$arch" | sudo tee pacman.d/mirrorlist
          fi

          # 2. INTEGRARE FUNDAL (Dacă ai încărcat poza)
          mkdir -p airootfs/usr/share/backgrounds/
          if [ -f happyos-wallpaper.png ]; then
            sudo cp happyos-wallpaper.png airootfs/usr/share/backgrounds/
          fi
          
          # 3. PERMISIUNI ȘI CURĂȚENIE
          mkdir -p output
          sudo rm -rf /tmp/archiso-tmp
          sudo chown -R root:root .
          
          # 4. START BUILD
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload ISO Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
