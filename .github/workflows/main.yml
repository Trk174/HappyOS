name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools git

      - name: Setup Archiso
        run: git clone https://gitlab.archlinux.org/archlinux/archiso.git && cd archiso && sudo make install

      - name: Auto-Repair and Build
        run: |
          # 1. Cream un profil curat de la zero (Ignoram erorile tale de sintaxa)
          mkdir -p happy_profile/airootfs
          
          # Copiem tot ce ai tu in noul profil
          cp -r airootfs/* happy_profile/airootfs/ 2>/dev/null || true
          
          # 2. Generam noi fisierul profiledef.sh (ca sa fim siguri ca e 100% corect)
          cat <<EOF > happy_profile/profiledef.sh
          iso_name="HappyOS"
          iso_label="HAPPYOS_$(date +%Y%m)"
          iso_publisher="HappyOS Builder"
          iso_application="HappyOS Linux"
          install_dir="arch"
          buildmodes=('iso')
          bootmodes=('bios.syslinux.mbr' 'bios.syslinux.eltorito' 'uefi-ia32.grub.esp' 'uefi-x64.grub.esp')
          arch="x86_64"
          pacman_conf="pacman.conf"
          airootfs_image_type="squashfs"
          airootfs_image_tool_options=('-comp' 'xz' '-Xbcj' 'x86')
          EOF

          # 3. Rezolvam problema cu pacman.conf (il cautam si il redenumim corect)
          find . -name "pacman.conf*" -exec cp {} happy_profile/pacman.conf \;
          mkdir -p happy_profile/pacman.d
          find . -name "mirrorlist" -exec cp {} happy_profile/pacman.d/mirrorlist \;

          # 4. Build forțat
          mkdir -p output
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output ./happy_profile

      - name: Upload ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
