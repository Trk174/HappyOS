name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build HappyOS
        run: |
          # Instalăm unelte de virtualizare și suport pentru fișiere Arch
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils

          # Descarcă și instalează archiso direct din sursele Arch
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso
          sudo make install
          cd ..

          # Creăm ISO-ul
          mkdir -p output
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
