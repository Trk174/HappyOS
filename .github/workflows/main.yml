name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts squashfs-tools xorriso erofs-utils mtools git

      - name: Setup Archiso
        run: |
          # Instalam ultima versiune de archiso direct de la sursa
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          cd archiso && sudo make install && cd ..

      - name: Prepare Workspace and Build
        run: |
          # 1. Curatam urmele vechi
          sudo rm -rf /tmp/archiso-tmp
          mkdir -p output
          
          # 2. REPARARE STRUCTURA (Mutam fisierele daca sunt puse gresit)
          # Mutam pacman.d in root daca e ratacit in folderul de workflow
          if [ -d .github/workflows/pacman.d ]; then
            mv .github/workflows/pacman.d ./
          fi
          
          # 3. INTEGRARE FUNDAL (Wallpaper)
          # Cream folderul de destinatie in interiorul ISO-ului
          mkdir -p airootfs/usr/share/backgrounds/
          # Daca ai urcat poza happyos-wallpaper.png, o mutam la locul ei
          if [ -f happyos-wallpaper.png ]; then
            cp happyos-wallpaper.png airootfs/usr/share/backgrounds/
          fi
          
          # 4. SETARE PERMISIUNI (Pasul critic pentru a evita Exit Code 2)
          # Archiso refuza sa ruleze daca fisierele nu apartin de root
          sudo chown -R root:root .
          
          # 5. LANSARE CONSTRUCTIE ISO
          sudo mkarchiso -v -w /tmp/archiso-tmp -o output .

      - name: Upload HappyOS ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
