name: Build HappyOS ISO :)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build HappyOS
        run: |
          mkdir -p output
          # Rulăm totul într-un container de Arch cu permisiuni de Root
          docker run --privileged -v $(pwd):/workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso &&
            # Reparăm permisiunile pentru workspace
            chmod -R 755 /workspace &&
            # START BUILD
            mkarchiso -v -w /tmp/archiso-tmp -o /workspace/output /workspace
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: HappyOS-ISO
          path: output/*.iso
